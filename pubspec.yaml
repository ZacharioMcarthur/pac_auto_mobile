name: courses_pac
description: "Application de gestion des course au Port Autonome de cotonou (PAC)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.2.2
  flutter_native_splash: ^2.4.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.2
  datetime_picker_formfield_new: ^2.1.0
  dropdown_button2: ^2.3.9
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo2.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#3e65af"
  image: assets/images/LOGO4.jpg
  
  android_12:
    # image: assets/images/logo.png
    # color: "#42a5f5"