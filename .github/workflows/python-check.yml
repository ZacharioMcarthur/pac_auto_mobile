# 1. Le nom de mon automatisation
name: PAC Project Quality Check

# 2. Le déclencheur
on: [push]

# 3. La liste des tâches
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Étape A : Téléchargement du code
      - uses: actions/checkout@v3

      # Étape B : Installation de Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Étape C : Installation des dépendances (Nouveau !)
      # Le robot a besoin de 'requests' pour faire tourner check_api.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Étape D : Vérification de la documentation
      - name: Run doc check
        run: python check_docs.py  # Garde ce chemin si ce fichier est à la racine

      # Étape E : Vérification de la structure API (Mise à jour du chemin !)
      - name: Run API check
        run: python scripts/check_api.py